<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>선함의 기준</title>

  <!-- ============================== -->
  <!-- CSS (style.css 내용 전부 붙여넣기) -->
  <!-- ============================== -->
  <style>

/* ============================= */
/* 전체 화면 중앙 정렬 */
/* ============================= */
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;

  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}


/* ============================= */
/* 게임 화면 */
/* ============================= */
#game {
  width: 90vw;
  height: calc(90vw * 0.5625);
  max-width: 1280px;
  max-height: 720px;

  position: relative;
  overflow: hidden;

  background: black;
  border: 2px solid red;
}


/* ============================= */
/* 배경 이미지 */
/* ============================= */
#background {
  width: 100%;
  height: 100%;

  position: absolute;
  top: 0;
  left: 0;

  background-image: url("images/Scene1_BG.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  z-index: 0;
}


/* ============================= */
/* 상단 정보 바 */
/* ============================= */
#top-bar {
  position: absolute;
  top: 0;
  left: 0;

  width: 100%;
  height: 44px;

  background: rgba(20, 20, 20, 0.9);
  border-bottom: 1px solid #555;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 0 28px;
  box-sizing: border-box;

  z-index: 50;
}


/* ============================= */
/* 작품 제목 */
/* ============================= */
#game-title {
  font-size: 18px;
  font-weight: bold;
  color: white;
}


/* ============================= */
/* 상태 값 */
/* ============================= */
#status-values {
  font-size: 14px;
  color: #ddd;
  letter-spacing: 0.5px;
}


/* ============================= */
/* 대사 UI 전체 영역 */
/* ============================= */
#dialogue-ui {
  position: absolute;
  left: 0;
  bottom: 0;

  width: 100%;
  height: 180px;

  z-index: 20;
  pointer-events: none;
}


/* ============================= */
/* 대사 박스 (하단 텍스트 바) */
/* ============================= */
#dialogue-box {
  position: absolute;
  left: 0;
  bottom: 0;

  width: 100%;
  height: 140px;

  background: rgba(0, 0, 0, 0.55);
  border-top: 2px solid rgba(255, 255, 255, 0.25);

  box-sizing: border-box;
  z-index: 10;
}


/* ============================= */
/* 대사 텍스트 (수정됨: 가독성 향상) */
/* ============================= */
#dialogue {
  position: absolute;
  left: 5%;
  top: 30px; 

  width: 55%;
  margin: 0;

  color: white;
  font-size: 18px;
  line-height: 1.7;
  font-weight: 600;

  word-break: keep-all;
  z-index: 999;

  /* 투명 배경에서 가독성을 높이기 위해 텍스트 쉐도우 추가 */
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}


/* ============================= */
/* 화자 이름 박스 */
/* ============================= */
#speaker-name {
  position: absolute;

  left: 5%;
  top: 0;

  min-width: 110px;
  padding: 10px 24px;

  background: rgba(0, 0, 0, 0.96);
  border: 3px solid rgba(255, 255, 255, 0.9);

  color: white;
  font-size: 20px;
  font-weight: 800;
  text-align: center;

  box-sizing: border-box;
  z-index: 30;
}


/* ============================= */
/* 선택지 영역 */
/* ============================= */
#choices {
  position: absolute;
  right: 5%;
  bottom: 25px; 

  width: 30%;

  z-index: 40;
  pointer-events: auto;
}


/* ============================= */
/* 선택지 버튼 */
/* ============================= */
#choices button {
  display: block;
  width: 100%;
  margin-bottom: 12px;

  padding: 14px 18px;

  background-color: rgba(20, 20, 20, 0.96);
  color: white;
  border: 2px solid rgba(255, 255, 255, 0.45);

  text-align: left;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;

  cursor: pointer;
  transition: all 0.2s ease;
}


/* ============================= */
/* 선택지 버튼 호버 효과 */
/* ============================= */
#choices button:hover {
  background-color: #444;
  transform: translateX(6px);
  border-color: #fff;
}

/* ============================= */
/* 긴급 초기화: 빈 화자 박스 제거 */
/* ============================= */
#speaker-name {
  display: none !important;
}

#speaker-name.show {
  display: block !important;

  position: absolute !important;
  left: 5% !important;
  top: 0 !important;

  min-width: 110px !important;
  padding: 10px 24px !important;

  background: rgba(0, 0, 0, 0.96) !important;
  border: 3px solid white !important;

  color: white !important;
  font-size: 20px !important;
  font-weight: 800 !important;
  text-align: center !important;

  box-sizing: border-box !important;
  z-index: 30 !important;
}


/* ============================= */
/* 추적 상태 표시 */
/* ============================= */
#route-status {
  font-weight: 800;
}

/* 감시됨 상태 */
#route-status.watched {
  color: #ff4b4b;
  animation: warningBlink 0.8s infinite;
}

/* 미기록 상태 */
#route-status.hidden {
  color: #7cffc4;
}

/* 아직 결정 안 됨 */
#route-status.unknown {
  color: #cccccc;
}

@keyframes warningBlink {
  0% {
    opacity: 1;
  }

  50% {
    opacity: 0.25;
  }

  100% {
    opacity: 1;
  }
}

/* ============================= */
/* 상태 숫자 변화 효과 */
/* ============================= */
.stat-change {
  color: #ff4b4b !important;
  animation: statNumberFlash 0.45s ease;
}

@keyframes statNumberFlash {
  0% {
    transform: scale(1);
    opacity: 1;
  }

  50% {
    transform: scale(1.35);
    opacity: 0.4;
  }

  100% {
    transform: scale(1);
    opacity: 1;
  }
}

#trust-value,
#doubt-value,
#info-value {
  display: inline-block;
  color: white;
  font-weight: 800;
}


/* ============================= */
/* 🧺 바구니 버튼 */
/* ============================= */
#inventory-button {
  position: absolute;
  top: 58px;
  right: 28px;

  width: 52px;
  height: 52px;

  padding: 0;
  background: rgba(0, 0, 0, 0.5);
  border: 2px solid rgba(255, 255, 255, 0.6);
  border-radius: 8px;

  cursor: pointer;
  z-index: 100;

  display: flex;
  justify-content: center;
  align-items: center;
}

#inventory-button img {
  width: 70%;
  height: 70%;
  object-fit: contain;
  pointer-events: none;
}

#inventory-button:hover {
  transform: scale(1.1);
  border-color: white;
}

/* ============================= */
/* 🧺 바구니 패널 */
/* ============================= */
#inventory-panel {
  display: none;
  position: absolute;

  top: 120px;
  right: 28px;

  width: 220px;
  padding: 16px;

  background: rgba(0, 0, 0, 0.9);
  border: 2px solid white;

  color: white;
  z-index: 100;
}




#inventory-panel.show {
  display: block;
}

/* ============================= */
/* 🧺 바구니 내부 설명 패널 */
/* ============================= */

#inventory-list li {
  cursor: pointer;
  margin-bottom: 6px;
}

#inventory-list li:hover {
  color: #ffcc66;
}

#item-description {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid #aaa;
  font-size: 14px;
  color: #ddd;
}

  </style>

  <script>
// ==============================
// 플레이어 상태값 (게임 변수)
// ==============================
let state = {
  Trust: 0,
  Doubt: 0,
  Info: 0,
  Route: 0,

  // 🧺 인벤토리
  Inventory: [
    {
      name: "편지",
      desc: "어머니가 할머니에게 보낸 봉인된 편지. 내용은 알 수 없다."
    },
    {
      name: "치즈",
      desc: "향이 강한 수제 치즈. 신선하다."
    },
    {
      name: "와인",
      desc: "붉은빛이 도는 수제 와인. 달콤한 향이 난다. 이상하게 알코올이 강한 것 같은 느낌이 든다."
    }
  ]
};

// ==============================
// 이전 상태값 저장 (숫자 변화 애니메이션용)
// ==============================
let prevState = {
  Trust: 0,
  Doubt: 0,
  Info: 0
};

// ==============================
// 상태값 표시 함수 (UI 업데이트)
// ==============================
function updateStatus() {
  const trustValue = document.getElementById("trust-value");
  const doubtValue = document.getElementById("doubt-value");
  const infoValue = document.getElementById("info-value");
  const routeStatus = document.getElementById("route-status");

  trustValue.textContent = state.Trust;
  doubtValue.textContent = state.Doubt;
  infoValue.textContent = state.Info;

  flashIfChanged(trustValue, state.Trust, prevState.Trust);
  flashIfChanged(doubtValue, state.Doubt, prevState.Doubt);
  flashIfChanged(infoValue, state.Info, prevState.Info);

  prevState.Trust = state.Trust;
  prevState.Doubt = state.Doubt;
  prevState.Info = state.Info;

  routeStatus.className = "";

  if (state.Route === 1) {
    routeStatus.textContent = "상태: 감시됨";
    routeStatus.classList.add("watched");
  } else if (state.Route === -1) {
    routeStatus.textContent = "상태: 미기록";
    routeStatus.classList.add("hidden");
  } else {
    routeStatus.textContent = "상태: 불명";
    routeStatus.classList.add("unknown");
  }
}

// ==============================
// 인벤토리 UI 업데이트
// ==============================
function updateInventory() {
  const inventoryList = document.getElementById("inventory-list");
  const descBox = document.getElementById("item-description");

  if (!inventoryList || !descBox) return;

  inventoryList.innerHTML = "";
  descBox.textContent = "아이템을 선택하세요.";

  state.Inventory.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.name;

    li.onclick = () => {
      showItemDescription(item);
    };

    inventoryList.appendChild(li);
  });
}


// ==============================
// 아이템 설명 출력 함수
// ==============================
function showItemDescription(item) {
  const descBox = document.getElementById("item-description");

  if (!descBox) return;

  descBox.textContent = item.desc;
}

// ==============================
// 상태 숫자 변화 애니메이션
// ==============================
function flashIfChanged(element, currentValue, previousValue) {
  if (currentValue === previousValue) return;

  element.classList.remove("stat-change");
  void element.offsetWidth;
  element.classList.add("stat-change");
}


// ==============================
// 🔊 사운드 재생 함수
// ==============================
function playSound(fileName) {
  const sound = new Audio(`media/${fileName}`);
  sound.currentTime = 0;
  sound.play();
}


// ==============================
// 선택지 효과 적용 함수 (변수 증가/감소)
// ==============================
function applyEffect(effect) {
  if (!effect) return;

  for (let key in effect) {
    if (state[key] === undefined) {
      state[key] = 0;
    }

    state[key] += effect[key];
  }

  updateStatus();
}


// ==============================
// 장면 출력 함수 (씬 렌더링 핵심 엔진)
// ==============================
function renderScene(sceneKey) {
  const scene = scenes[sceneKey];

  // 존재하지 않는 씬 방지
  if (!scene) {
    console.error(`씬 없음: ${sceneKey}`);
    return;
  }

  const bg = document.getElementById("background");

if (scene.background) {
  bg.style.backgroundImage = `url("${scene.background}")`;
}

  const dialogue = document.getElementById("dialogue");
  const choices = document.getElementById("choices");
  const speakerName = document.getElementById("speaker-name");

  let stepIndex = 0;


  // ==============================
  // 스텝 출력 함수 (다음 버튼 진행)
  // ==============================
  function showStep() {
    if (!scene.steps || scene.steps.length === 0) {
      console.error(`${sceneKey}에 steps 없음`);
      return;
    }

    const step = scene.steps[stepIndex];

     // ==============================
     // 🎬 스텝별 배경 변경
     // ==============================
      if (step.background) {
        const bg = document.getElementById("background");
        bg.style.backgroundImage = `url("${step.background}")`;
      }


// ==============================
// 대사 / 나레이션 출력 처리
// ==============================

// 🔥 텍스트 처리 (함수 + 문자열 둘 다 대응)
let currentText = "";

try {
  if (typeof step.text === "function") {
    currentText = step.text(state);
  } else {
    currentText = step.text || "";
  }
} catch (e) {
  console.error("텍스트 처리 오류:", e);
  currentText = "텍스트 오류 발생";
}

// 🔥 UI 출력
if (step.type === "dialogue") {
  speakerName.textContent = step.speaker || "";
  speakerName.classList.add("show");
} else {
  speakerName.textContent = "";
  speakerName.classList.remove("show");
}

dialogue.textContent = currentText;


    // 버튼 초기화
    choices.innerHTML = "";



    // ==============================
    // 다음 버튼 출력
    // ==============================
    if (stepIndex < scene.steps.length - 1) {
      const nextButton = document.createElement("button");
      nextButton.textContent = "다음";

    nextButton.onclick = () => {

      // 🔊 다음 버튼 클릭 사운드
      playSound("click.mp3");

      stepIndex++;
      showStep();
    };

      choices.appendChild(nextButton);
      return;
    }


    // ==============================
    // 선택지 출력
    // ==============================
    if (scene.choices && scene.choices.length > 0) {
      scene.choices.forEach(choice => {
        const button = document.createElement("button");
        button.textContent = choice.text;

       button.onclick = () => {

        // 🔊 선택지 클릭 사운드
        playSound("click.mp3");

        applyEffect(choice.effect);
        renderScene(choice.next);
      };

        choices.appendChild(button);
      });

      return;
    }


    // ==============================
    // 선택지가 없는 경우
    // ==============================
    const endText = document.createElement("div");
    endText.textContent = "(다음 내용 없음)";
    choices.appendChild(endText);
  }


  // 첫 스텝 실행
  showStep();
}


// ==============================
// 게임 시작
// ==============================
window.onload = () => {
  updateStatus();
  updateInventory();

  const inventoryButton = document.getElementById("inventory-button");
  const inventoryPanel = document.getElementById("inventory-panel");

  if (inventoryButton && inventoryPanel) {
    inventoryButton.onclick = () => {
      inventoryPanel.classList.toggle("show");
    };
  }

  renderScene("S1");
};

  </script>
